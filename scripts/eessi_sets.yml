eessi_archs:
  - linux-aarch64
  - linux-ppc64le
  - linux-x86_64
#  - macos-aarch64
#  - macos-x86_64

eessi_sets:
  eessi-2021.02:
    packages:
      app-editors/emacs:
      app-editors/vim:
      dev-python/pip:
      dev-python/GitPython:
      dev-python/keyring:
      dev-python/pycodestyle:
      dev-util/pkgconfig:
      media-fonts/dejavu:
      media-fonts/liberation-fonts:
      sys-apps/archspec:
        version: 0.1.2
        overlay: eessi
      sys-apps/dbus:
      sys-cluster/lmod:
      sys-cluster/rdma-core:
        version: 33.1
        overlay: eessi
        exclude_on:
          - macos-aarch64
          - macos-x86_64
      sys-fabric/opa-psm2:
        version: 11.2.185
        overlay: eessi
        include_on: 
          - linux-x86_64
      sys-libs/pam:
        exclude_on:
          - macos-aarch64
          - macos-x86_64
